UserParameter=kms.license.name[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\kms_license_monitor.ps1" -Mode metric -ProductId "$1" -Field name
UserParameter=kms.license.type[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\kms_license_monitor.ps1" -Mode metric -ProductId "$1" -Field type